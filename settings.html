<div class="dnd-settings-container">
    <div class="inline-drawer">
        <div class="inline-drawer-toggle inline-drawer-header">
            <b>D&D 5e Lite</b>
            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
        </div>
        <div class="inline-drawer-content">
            <label class="checkbox_label" for="dnd-extension-enabled">
                <input type="checkbox" id="dnd-extension-enabled" />
                <span>Enable D&D 5e Lite</span>
            </label>
            <small>Lightweight RPG tracker for D&D 5e campaigns. Open the side panel for full controls.</small>
            <hr />
            <label class="checkbox_label" for="dnd-v1-enabled">
                <input type="checkbox" id="dnd-v1-enabled" />
                <span>Character System V1 (Full Character Builder)</span>
            </label>
            <small>Enables the full character builder with computed stats, species, backgrounds, and context injection. When off, the legacy class reference panel is used.</small>
            <hr />
            <small>v1.0.0</small>
        </div>
    </div>
</div>
