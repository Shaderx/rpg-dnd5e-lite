<!-- D&D 5e Lite - Main Panel -->
<div id="dnd-panel" class="dnd-panel dnd-position-right">
    <!-- Collapse toggle (tab outside panel) -->
    <button id="dnd-collapse-toggle" class="dnd-collapse-toggle" title="Collapse/Expand">
        <i class="fa-solid fa-chevron-right"></i>
    </button>

    <!-- Strip widget container (visible when collapsed with strip enabled) -->
    <div id="dnd-strip-widget-container" class="dnd-strip-widget-container">
        <button id="dnd-strip-power" class="dnd-strip-power-btn dnd-power-on" title="Toggle Extension">
            <i class="fa-solid fa-power-off"></i>
        </button>

        <!-- Strip: mini analog clock -->
        <div class="dnd-strip-widget dnd-strip-widget-time" title="Time">
            <div class="dnd-analog-clock dnd-clock-strip">
                <div class="dnd-clock-hand dnd-clock-hour dnd-strip-clock-hour"></div>
                <div class="dnd-clock-hand dnd-clock-minute dnd-strip-clock-minute"></div>
                <div class="dnd-clock-center"></div>
            </div>
            <span class="dnd-strip-time-value">--:--</span>
        </div>

        <!-- Strip: season date -->
        <div class="dnd-strip-widget dnd-strip-widget-date" title="Date">
            <span class="dnd-strip-date-value">---</span>
        </div>

        <!-- Strip: location -->
        <div class="dnd-strip-widget dnd-strip-widget-location" title="Location">
            <i class="fa-solid fa-map-marker-alt dnd-strip-loc-icon"></i>
            <span class="dnd-strip-location-value">---</span>
        </div>

        <!-- Strip: weather emoji -->
        <div class="dnd-strip-widget dnd-strip-widget-weather" title="Weather">
            <span class="dnd-strip-weather-emoji">🌤️</span>
            <span class="dnd-strip-weather-value">---</span>
        </div>

        <!-- Strip: spell slots per-level -->
        <div class="dnd-strip-widget dnd-strip-widget-spells" title="Spell Slots">
            <div class="dnd-strip-spell-levels"></div>
        </div>

        <!-- Strip: currency -->
        <div class="dnd-strip-widget dnd-strip-widget-currency" title="Currency">
            <span class="dnd-strip-currency-icon">💰</span>
            <span class="dnd-strip-currency-value">---</span>
        </div>

        <!-- Strip: omni extras (dynamically populated) -->
        <div class="dnd-strip-extras-container"></div>

        <!-- Strip dice roller -->
        <div class="dnd-strip-widget dnd-strip-widget-dice">
            <button class="dnd-strip-dice-roll" title="Roll d20">
                <i class="fa-solid fa-dice-d20"></i>
            </button>
            <span class="dnd-strip-dice-result">--</span>
            <button class="dnd-strip-dice-clear" title="Clear roll" style="display:none;">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <!-- Strip quest summary -->
        <div class="dnd-strip-widget dnd-strip-widget-quests">
            <div class="dnd-strip-quests-list"></div>
        </div>

        <button id="dnd-strip-reload" class="dnd-strip-reload-btn" title="Refresh from chat">
            <i class="fa-solid fa-rotate"></i>
        </button>
    </div>

    <!-- Game container (visible when expanded) -->
    <div class="dnd-game-container">
        <!-- Header -->
        <div class="dnd-panel-header">
            <h3><i class="fa-solid fa-dice-d20"></i> <span id="dnd-panel-title">D&D 5e Lite</span></h3>
            <div class="dnd-header-actions">
                <button id="dnd-refresh-btn" class="dnd-header-btn" title="Refresh from chat">
                    <i class="fa-solid fa-rotate"></i>
                </button>
                <button id="dnd-panel-power" class="dnd-panel-power-btn dnd-power-on" title="Toggle Extension">
                    <i class="fa-solid fa-power-off"></i>
                </button>
            </div>
        </div>

        <div id="dnd-panel-content">
            <!-- Header Info Widgets -->
            <div class="dnd-info-widgets">
                <!-- Analog clock + digital time -->
                <div class="dnd-info-widget dnd-widget-time">
                    <div class="dnd-analog-clock" id="dnd-analog-clock">
                        <div class="dnd-clock-hand dnd-clock-hour" id="dnd-clock-hour"></div>
                        <div class="dnd-clock-hand dnd-clock-minute" id="dnd-clock-minute"></div>
                        <div class="dnd-clock-center"></div>
                    </div>
                    <div class="dnd-widget-content">
                        <span class="dnd-widget-label">Time</span>
                        <span class="dnd-widget-value dnd-digital-time" id="dnd-info-time">--:--</span>
                    </div>
                </div>

                <!-- Season date card -->
                <div class="dnd-info-widget dnd-widget-date" id="dnd-date-widget">
                    <div class="dnd-season-overlay"></div>
                    <div class="dnd-widget-content dnd-date-content">
                        <span class="dnd-widget-label">Date</span>
                        <span class="dnd-widget-value" id="dnd-info-date">---</span>
                    </div>
                </div>

                <!-- Location with dynamic icon -->
                <div class="dnd-info-widget dnd-widget-location dnd-widget-wide">
                    <div class="dnd-widget-icon" id="dnd-location-icon"><i class="fa-solid fa-map-marker-alt"></i></div>
                    <div class="dnd-widget-content">
                        <span class="dnd-widget-label">Location</span>
                        <span class="dnd-widget-value" id="dnd-info-location">---</span>
                    </div>
                </div>

                <!-- Weather with large emoji (full width, below location) -->
                <div class="dnd-info-widget dnd-widget-weather dnd-widget-wide">
                    <span class="dnd-weather-emoji" id="dnd-weather-emoji">🌤️</span>
                    <div class="dnd-widget-content">
                        <span class="dnd-widget-label">Weather</span>
                        <span class="dnd-widget-value" id="dnd-info-weather">---</span>
                    </div>
                </div>

                <!-- Currency (half or hidden; spell slots expands when no currency) -->
                <div class="dnd-info-widget dnd-widget-currency" id="dnd-currency-widget">
                    <span class="dnd-currency-icon">💰</span>
                    <div class="dnd-widget-content">
                        <span class="dnd-widget-label">Currency</span>
                        <div class="dnd-currency-coins" id="dnd-info-currency">
                            <span class="dnd-coin dnd-coin-gold"><span class="dnd-coin-val">0</span> 🟡</span>
                            <span class="dnd-coin dnd-coin-silver"><span class="dnd-coin-val">0</span> ⚪</span>
                            <span class="dnd-coin dnd-coin-copper"><span class="dnd-coin-val">0</span> 🟤</span>
                        </div>
                    </div>
                </div>

                <!-- Spell slots per-level display -->
                <div class="dnd-info-widget dnd-widget-spells dnd-widget-wide" id="dnd-spells-widget">
                    <div class="dnd-widget-content">
                        <span class="dnd-widget-label">Spell Slots</span>
                        <div class="dnd-spell-levels" id="dnd-spell-levels"></div>
                    </div>
                </div>
            </div>

            <!-- Omni / extra widgets (dynamically populated) -->
            <div class="dnd-omni-widgets" id="dnd-omni-widgets"></div>

            <!-- Dice roller -->
            <div class="dnd-dice-section">
                <button id="dnd-roll-btn" class="dnd-roll-btn" title="Roll d20">
                    <i class="fa-solid fa-dice-d20"></i>
                    <span>Roll d20</span>
                </button>
                <div class="dnd-roll-result" id="dnd-roll-result" style="display:none;">
                    <span class="dnd-roll-value" id="dnd-roll-value"></span>
                    <button id="dnd-clear-roll" class="dnd-clear-roll-btn" title="Clear roll">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </div>

            <!-- Content box: Quests -->
            <div class="dnd-content-box">
                <div id="dnd-quests" class="dnd-section">
                    <div class="dnd-section-header">Quests</div>
                    <div id="dnd-quests-list" class="dnd-quests-list">
                        <div class="dnd-empty-state">No quests yet</div>
                    </div>
                    <div class="dnd-add-quest-row">
                        <input type="text" id="dnd-add-quest-input" class="dnd-add-quest-input" placeholder="New quest..." />
                        <button id="dnd-add-quest-btn" class="dnd-btn-small" title="Add quest">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Spell Log (own container) -->
            <div class="dnd-spell-log-container">
                <div class="dnd-spell-log-header">
                    <i class="fa-solid fa-wand-sparkles"></i>
                    <span>Spell Log</span>
                </div>
                <div id="dnd-spell-log-list" class="dnd-spell-log-list">
                    <div class="dnd-spell-log-empty">No spells tracked</div>
                </div>
                <div class="dnd-spell-log-actions">
                    <input type="text" id="dnd-add-spell-input" class="dnd-spell-log-input" placeholder="Spell name..." />
                    <button id="dnd-add-spell-btn" class="dnd-spell-log-action-btn" title="Add spell cast">
                        <i class="fa-solid fa-wand-sparkles"></i>
                    </button>
                    <button id="dnd-add-rest-btn" class="dnd-spell-log-action-btn dnd-spell-log-rest-btn" title="Add long rest">
                        <i class="fa-solid fa-bed"></i>
                    </button>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="dnd-settings-buttons-row">
                <button id="dnd-open-attr-editor" class="dnd-btn dnd-btn-third">
                    <i class="fa-solid fa-sliders"></i> Attributes
                </button>
                <button id="dnd-open-settings" class="dnd-btn dnd-btn-third">
                    <i class="fa-solid fa-gear"></i> Settings
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Mobile FAB toggle -->
<button id="dnd-mobile-toggle" class="dnd-mobile-toggle">
    <i class="fa-solid fa-dice-d20"></i>
</button>

<!-- Attribute Editor Modal -->
<div id="dnd-attr-editor-popup" class="dnd-modal-overlay" style="display:none;">
    <div class="dnd-modal">
        <div class="dnd-modal-header">
            <span>Edit Attributes</span>
            <button class="dnd-modal-close" id="dnd-attr-editor-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="dnd-modal-body">
            <div class="dnd-editor-grid" id="dnd-attr-editor-grid"></div>
        </div>
        <div class="dnd-modal-footer">
            <button id="dnd-attr-editor-save" class="dnd-btn dnd-btn-primary">Save</button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div id="dnd-settings-popup" class="dnd-modal-overlay" style="display:none;">
    <div class="dnd-modal">
        <div class="dnd-modal-header">
            <span>Settings</span>
            <button class="dnd-modal-close" id="dnd-settings-close"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="dnd-modal-body">
            <label class="dnd-toggle-label">
                <input type="checkbox" id="dnd-setting-strip-widgets" />
                <span>Show strip widgets (collapsed sidebar)</span>
            </label>
            <div class="dnd-setting-row">
                <span>Panel position:</span>
                <select id="dnd-setting-position">
                    <option value="right">Right</option>
                    <option value="left">Left</option>
                </select>
            </div>
            <div class="dnd-setting-row">
                <span>Quest injection depth (AN):</span>
                <input type="number" id="dnd-setting-quest-depth" min="0" max="99" value="4" style="width:3.5em;" />
            </div>

            <div style="margin-top:0.8em; padding-top:0.8em; border-top:1px solid var(--dnd-border);">
                <label class="dnd-toggle-label" style="margin-bottom:0.5em;">
                    <input type="checkbox" id="dnd-setting-weather-visuals" />
                    <i class="fa-solid fa-cloud-sun-rain"></i>
                    <span>Weather background effects</span>
                </label>
                <div class="dnd-setting-row">
                    <span>Particle count:</span>
                    <input type="range" id="dnd-setting-weather-particles" min="0" max="300" step="10" style="width:8em;" />
                </div>
            </div>

            <div style="margin-top:0.8em; padding-top:0.8em; border-top:1px solid var(--dnd-border);">
                <label class="dnd-toggle-label" style="margin-bottom:0.5em;">
                    <input type="checkbox" id="dnd-setting-lighting-overlay" />
                    <i class="fa-solid fa-sun"></i>
                    <span>Time-of-day lighting overlay</span>
                </label>
                <div class="dnd-setting-row">
                    <span>Intensity:</span>
                    <input type="range" id="dnd-setting-lighting-intensity" min="0" max="2" step="0.05" style="width:8em;" />
                    <span id="dnd-setting-lighting-intensity-val" style="font-size:0.8em;min-width:2.5em;text-align:right;opacity:0.6;">1.0</span>
                </div>
                <div class="dnd-setting-row">
                    <span>Blend mode:</span>
                    <select id="dnd-setting-lighting-blend">
                        <option value="soft-light">Soft Light</option>
                        <option value="overlay">Overlay</option>
                        <option value="multiply">Multiply</option>
                        <option value="screen">Screen</option>
                        <option value="color">Color</option>
                        <option value="hard-light">Hard Light</option>
                        <option value="color-dodge">Color Dodge</option>
                        <option value="color-burn">Color Burn</option>
                        <option value="normal">Normal (flat)</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>
